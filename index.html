<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Kreasi</title>
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .ios-icon:active { transform: scale(0.92); transition: 0.1s; }
        /* Animasi Shake untuk pesan error */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body class="overflow-hidden">

    <div class="h-screen w-full bg-cover bg-center flex flex-col items-center relative" 
         style="background-image: url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=1974&auto=format&fit=crop');">
        
        <div class="w-full flex justify-between px-8 pt-4 text-white text-sm font-semibold tracking-wide z-20">
            <div id="clock">00:00</div> 
            <div class="flex items-center space-x-3">
                <div class="group relative cursor-help">
                    <span id="wifi-icon">📶</span>
                    <div class="absolute top-6 right-0 scale-0 transition-all rounded bg-black/80 p-2 text-[10px] text-white group-hover:scale-100 whitespace-nowrap">
                        Connected to: <span id="network-name">Detecting...</span>
                    </div>
                </div>

                <div class="flex items-center space-x-1">
                    <span id="battery-level" class="text-[10px]">--%</span>
                    <span id="battery-icon">🔋</span>
                </div>
            </div>
        </div>

        <div class="mt-10 grid grid-cols-4 gap-y-8 gap-x-6 px-6 w-full max-w-md">
            <a href="https://rostergen.labkreasi.my.id" class="flex flex-col items-center group">
                <div class="w-16 h-16 bg-white rounded-[1.25rem] shadow-lg flex items-center justify-center overflow-hidden transform transition duration-200 group-hover:scale-105 ios-icon border border-gray-100">
                    <img src="public/rostergen.ico" alt="RosterGen" class="w-full h-full object-cover shadow-inner" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=RG&background=7C3AED&color=fff';"> 
                </div>
                <span class="text-white text-[11px] mt-1.5 font-medium drop-shadow-md">RosterGen</span>
            </a>

            <a href="#" class="flex flex-col items-center group">
                <div class="w-16 h-16 bg-gradient-to-br from-pink-500 to-rose-600 rounded-[1.25rem] shadow-lg flex items-center justify-center transform transition duration-200 group-hover:scale-105 ios-icon">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <span class="text-white text-[11px] mt-1.5 font-medium drop-shadow-md">Galeri</span>
            </a>

            <a href="#" class="flex flex-col items-center group">
                <div class="w-16 h-16 bg-white rounded-[1.25rem] shadow-lg flex items-center justify-center overflow-hidden transform transition duration-200 group-hover:scale-105 ios-icon border border-gray-200">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/HP_logo_2012.svg" class="w-10 h-10 object-contain" alt="App">
                </div>
                <span class="text-white text-[11px] mt-1.5 font-medium drop-shadow-md">Dashboard</span>
            </a>

            <a href="#" class="flex flex-col items-center group">
                <div class="w-16 h-16 bg-gradient-to-br from-green-400 to-green-600 rounded-[1.25rem] shadow-lg flex items-center justify-center transform transition duration-200 group-hover:scale-105 ios-icon">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <span class="text-white text-[11px] mt-1.5 font-medium drop-shadow-md">Kontak</span>
            </a>
        </div>

        <div class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/10 backdrop-blur-3xl px-5 py-4 rounded-[2.5rem] flex items-end space-x-5 border border-white/10 shadow-2xl z-30">
            
            <a href="profil.html" class="w-16 h-16 bg-gradient-to-b from-green-400 to-green-600 rounded-[1.25rem] shadow-lg flex items-center justify-center cursor-pointer transition-all duration-200 hover:-translate-y-2 hover:scale-110 active:scale-90 shadow-black/20 hover:shadow-black/40">
                <svg class="w-9 h-9 text-white fill-current" viewBox="0 0 24 24">
                    <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                </svg>
            </a>

            <div onclick="openCamera()" class="w-16 h-16 bg-gradient-to-b from-gray-200 to-gray-400 rounded-[1.25rem] shadow-lg flex items-center justify-center relative overflow-hidden cursor-pointer transition-all duration-200 hover:-translate-y-2 hover:scale-110 active:scale-90 shadow-black/20 hover:shadow-black/40">
                <div class="w-10 h-7 bg-gray-700 rounded-sm relative">
                    <div class="absolute inset-0 m-auto w-5 h-5 bg-gray-800 border-2 border-gray-500 rounded-full flex items-center justify-center">
                        <div class="w-2 h-2 bg-blue-400/30 rounded-full"></div>
                    </div>
                    <div class="absolute top-1 right-1 w-1 h-1 bg-yellow-200 rounded-full"></div>
                </div>
                <div class="absolute top-3 w-4 h-1 bg-gray-700 rounded-t-sm"></div>
            </div>

            <div onclick="notInstalled('Musik')" class="w-16 h-16 bg-gradient-to-tr from-rose-500 to-pink-400 rounded-[1.25rem] shadow-lg flex items-center justify-center cursor-pointer transition-all duration-200 hover:-translate-y-2 hover:scale-110 active:scale-90 shadow-black/20 hover:shadow-black/40">
                <svg class="w-10 h-10 text-white fill-current" viewBox="0 0 24 24">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                </svg>
            </div>

            <div onclick="notInstalled('Pesan')" class="w-16 h-16 bg-gradient-to-b from-green-400 to-green-500 rounded-[1.25rem] shadow-lg flex items-center justify-center cursor-pointer transition-all duration-200 hover:-translate-y-2 hover:scale-110 active:scale-90 shadow-black/20 hover:shadow-black/40">
                <div class="w-10 h-8 bg-white rounded-2xl relative flex items-center justify-center">
                    <div class="absolute -bottom-1 -left-1 w-4 h-4 bg-white rotate-45 rounded-sm"></div>
                </div>
            </div>

        </div>

        <div class="absolute bottom-1 w-32 h-1 bg-white/60 rounded-full"></div>
    </div>

    <div id="camera-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/90 p-4">
        <div class="relative w-full max-w-lg bg-gray-900 rounded-[2.5rem] overflow-hidden border border-white/20 shadow-2xl">
            <div class="absolute top-0 w-full p-6 flex justify-between items-center z-10 text-white">
                <button onclick="closeCamera()" class="bg-white/20 backdrop-blur-md px-4 py-2 rounded-full text-sm font-medium hover:bg-white/40 transition">Selesai</button>
                <div class="w-8 h-8 bg-yellow-500 rounded-full flex items-center justify-center">📷</div>
            </div>
            <video id="video-feed" autoplay playsinline class="w-full h-[70vh] object-cover bg-black"></video>
            <div class="absolute bottom-10 w-full flex justify-center items-center">
                <div onclick="takePhoto()" class="w-20 h-20 border-4 border-white rounded-full flex items-center justify-center p-1 cursor-pointer active:scale-90 transition">
                    <div class="w-full h-full bg-white rounded-full"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="alert-box" class="fixed top-20 left-1/2 -translate-x-1/2 z-[200] hidden">
        <div class="bg-white/80 backdrop-blur-xl px-6 py-3 rounded-2xl shadow-2xl border border-white/20 flex items-center space-x-3">
            <span class="text-2xl">⚠️</span>
            <div>
                <p id="alert-msg" class="text-gray-900 font-semibold text-sm">Aplikasi belum terinstal</p>
                <p class="text-gray-500 text-[10px]">Silakan hubungi administrator</p>
            </div>
        </div>
    </div>

    <script>
        // Fungsi Notifikasi Belum Terinstal
        function notInstalled(appName) {
            const box = document.getElementById('alert-box');
            const msg = document.getElementById('alert-msg');
            msg.textContent = `Aplikasi ${appName} belum terinstal`;
            
            box.classList.remove('hidden');
            box.classList.add('shake');
            
            setTimeout(() => {
                box.classList.add('hidden');
                box.classList.remove('shake');
            }, 2500);
        }

        // 1. Logika Jam
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Logika Baterai
        function updateBattery() {
            if ('getBattery' in navigator) {
                navigator.getBattery().then(function(battery) {
                    function updateAllBatteryInfo() {
                        const level = Math.round(battery.level * 100);
                        const batteryLevelEle = document.getElementById('battery-level');
                        const batteryIconEle = document.getElementById('battery-icon');
                        batteryLevelEle.textContent = level + '%';
                        if (battery.charging) {
                            batteryLevelEle.className = "text-[10px] text-green-400 font-bold";
                            batteryIconEle.textContent = '⚡️';
                        } else if (level <= 20) {
                            batteryLevelEle.className = "text-[10px] text-red-500 font-bold animate-pulse";
                            batteryIconEle.textContent = '🪫';
                        } else {
                            batteryLevelEle.className = "text-[10px] text-white";
                            batteryIconEle.textContent = '🔋';
                        }
                    }
                    updateAllBatteryInfo();
                    battery.addEventListener('levelchange', updateAllBatteryInfo);
                    battery.addEventListener('chargingchange', updateAllBatteryInfo);
                });
            }
        }
        updateBattery();

        // 3. Logika Jaringan
        function updateNetworkInfo() {
            const netName = document.getElementById('network-name');
            const wifiIcon = document.getElementById('wifi-icon');
            if (navigator.onLine) {
                wifiIcon.textContent = '📶';
                const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                netName.textContent = conn ? conn.effectiveType.toUpperCase() + " Connection" : "Online";
            } else {
                wifiIcon.textContent = '✈️';
                netName.textContent = "Disconnected";
            }
        }
        updateNetworkInfo();
        window.addEventListener('online', updateNetworkInfo);
        window.addEventListener('offline', updateNetworkInfo);

        // 4. Logika Kamera
        let stream = null;
        async function openCamera() {
            const modal = document.getElementById('camera-modal');
            const video = document.getElementById('video-feed');
            modal.classList.remove('hidden');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
            } catch (err) {
                alert("Gagal mengakses kamera: " + err.message);
                closeCamera();
            }
        }
        function closeCamera() {
            if (stream) stream.getTracks().forEach(track => track.stop());
            document.getElementById('camera-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
